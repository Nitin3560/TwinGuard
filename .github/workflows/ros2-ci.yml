name: ROS 2 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  humble-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up ROS 2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble

      - name: Install workspace tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-colcon-common-extensions \
            ros-humble-ros-base \
            python3-vcstool

      - name: Prepare fresh workspace
        run: |
          mkdir -p ~/twinguard_ws/src
          cp -a ros2_ws/src/. ~/twinguard_ws/src/
          vcs import ~/twinguard_ws/src < dependencies.repos

      - name: Install ROS dependencies
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths ~/twinguard_ws/src --ignore-src -r -y --rosdistro humble \
            --skip-keys "ros_gz_bridge ros_gz_image"

      - name: Build workspace
        run: |
          source /opt/ros/humble/setup.bash
          cd ~/twinguard_ws
          colcon build --symlink-install --event-handlers console_direct+

      - name: Run tests
        run: |
          source /opt/ros/humble/setup.bash
          cd ~/twinguard_ws
          source install/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose
